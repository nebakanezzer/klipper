[mcu]
serial: /dev/serial/by-id/usb-Prusa_Research__prusa3d.com__Original_Prusa_i3_MK3_CZPX2619X004XC31083-if00

restart_method: command

[include mainsail.cfg]
[include einsy-rambo.cfg] #board
[include display.cfg]
[include steppers.cfg]
[include tmc2130.cfg]
[include prusa.cfg]
[include v6.cfg]
[include macros.cfg]
# Linear correction
# Check `extruders/linear-correction` for more informations.
[include linear-correction-0.cfg] # Default Prusa linear correction optimized for LDO motors
[include KAMP_Settings.cfg]


[exclude_object]

[extruder]
# To tune Pressure Advance see https://www.klipper3d.org/Pressure_Advance.html
# default is already set based on hotend, but you can further improve prints by calibrating it to your nozzle and material
# pressure_advance: 0.05
nozzle_diameter: 0.4 # Remember to change this if you change nozzle diameter.
min_temp: 0
max_temp: 305
min_extrude_temp: 170


## copy this from your current setting on Prusa, but make it absolute (removing -)
[probe]
z_offset = 0.765

## For faster printing enable
[printer]
max_accel: 8000
max_z_velocity: 10
max_z_accel: 150

## For stealth mode enable

[tmc2130 stepper_x]
interpolate: True
stealthchop_threshold: 80
[tmc2130 stepper_y]
interpolate: True
stealthchop_threshold: 80
[tmc2130 stepper_z]
interpolate: True
stealthchop_threshold: 80


