[include mainsail.cfg]
[include mainboard.cfg]
[include display.cfg]
[include steppers.cfg]
[include tmc2130.cfg]
[include prusa.cfg]
[include macros.cfg]
[include linear-correction-0.cfg] # Default Prusa linear correction optimized for LDO motors
[include KAMP_Settings.cfg]
[include probe.cfg]
[include extruder.cfg]


## For faster printing enable
[printer]
max_accel: 8000
max_z_velocity: 10
max_z_accel: 150


[exclude_object]

## For stealth mode enable

[tmc2130 stepper_x]
interpolate: True
stealthchop_threshold: 80
[tmc2130 stepper_y]
interpolate: True
stealthchop_threshold: 80
[tmc2130 stepper_z]
interpolate: True
stealthchop_threshold: 80


