## For stealth mode enable

[tmc2130 stepper_x]
interpolate: True
stealthchop_threshold: 80
[tmc2130 stepper_y]
interpolate: True
stealthchop_threshold: 80
[tmc2130 stepper_z]
interpolate: True
stealthchop_threshold: 80


[tmc2130 stepper_x]
cs_pin: PG0
interpolate: True
stealthchop_threshold: 0
run_current: .281738
hold_current: .281738
sense_resistor: 0.220
diag1_pin: !PK2
driver_IHOLDDELAY: 8
driver_TPOWERDOWN: 0
driver_TBL: 2
driver_TOFF: 3
driver_HEND: 1
driver_HSTRT: 5
driver_PWM_FREQ: 2
driver_PWM_GRAD: 2
driver_PWM_AMPL: 230
driver_PWM_AUTOSCALE: True
driver_SGT: 3

