[extruder]
max_extrude_only_distance: 200
max_temp: 305
min_extrude_temp: 170
min_temp: 0
nozzle_diameter: 0.4
#pressure_advance: 0.06
filament_diameter: 1.750
heater_pin: PE5
#sensor_type: ATC Semitec 104GT-2
sensor_type: NTC 100K MGB18-104F39050L32
sensor_pin: PF0

[heater_fan nozzle_cooling_fan]
pin: PH5
heater: extruder
heater_temp: 50.0
fan_speed: 1.0

# Part Cooling Fan
[fan]
pin: PH3

[firmware_retraction]
retract_length: 0.5
